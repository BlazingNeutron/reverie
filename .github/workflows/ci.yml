name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Run tests and upload coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        working-directory: ./apps/web/
        run: npm ci

      - name: Verify licenses
        run: npm run check:licenses

      - name: Build workspace
        working-directory: ./apps/web/
        run: turbo build

      - name: Run tests across workspace (with coverage)
        working-directory: ./apps/web/
        run: turbo test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            **/coverage/**

  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build migrator image
        uses: docker/build-push-action@v6.5.0
        with:
          context: ./docker/migrator/
          file: ./docker/migrator/Dockerfile
          build-contexts: |
            migrations=./supabase/migrations
          tags: ghcr.io/blazingneutron/reverie-migrator:${{ github.sha }}
          load: true
          push: false
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:latest
          cache-to: type=inline

      - name: Setup docker compose .env file
        working-directory: ./docker/
        run: |
          cp .env.dev-env .env
          echo "IMAGE_TAG=${{ github.sha }}" >> .env
      - name: Bring up test stack
        working-directory: ./docker/
        run: docker compose -f docker-compose.dev-env.yml up db nginx reverie-web rest realtime auth mail -d --wait
      - name: Wait for migrations
        working-directory: ./docker/
        env:
          WAIT_TIMEOUT: 120
        run: |
          timeout "${WAIT_TIMEOUT}" \
            docker compose -f docker-compose.dev-env.yml up \
              --exit-code-from migrator \
              migrator

          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Migration failed or timed out (exit code $EXIT_CODE)"
            docker compose -f docker-compose.dev-env.yml logs migrator
            exit $EXIT_CODE
          fi

      - name: Setup integration .env file
        working-directory: ./apps/web/
        run: |
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" > .env.it
          echo "VITE_SUPABASE_BASE_URL=http://localhost:8000" >> .env.it

      - name: Install dependencies
        working-directory: ./apps/web/
        run: npm i

      - name: Run Integration tests
        working-directory: ./apps/web/
        run: npm run test:integration

      - name: Shut down test stack
        working-directory: ./docker/
        if: always()
        run: docker compose -f docker-compose.dev-env.yml down
