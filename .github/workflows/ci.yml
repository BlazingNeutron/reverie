name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Run tests and upload coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./apps/web/
        run: npm ci
      
      - name: Verify licenses
        run: npm run check:licenses

      - name: Run tests across workspace (with coverage)
        working-directory: ./apps/web/
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            **/coverage/**
            
  build:
    needs: unit-tests
    runs-on: ubuntu-latest
    outputs:
        migrator-tag: ${{ steps.bulid.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build migrator image
        uses: docker/build-push-action@v6.5.0
        with:
          context: ./docker/migrator/
          file: ./docker/migrator/Dockerfile
          build-contexts: |
            migrations=./supabase/migrations
          tags: ghcr.io/blazingneutron/reverie-migrator:${{ github.sha }}
          load: true
          push: false
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:latest
          cache-to: type=inline
          
  integration-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup docker compose .env file
        working-directory: ./docker/
        run: |
          cp .env.dev-env .env
          echo "IMAGE=${{ needs.build.outputs.migrator-tag }}" >> .env
      - name: Bring up test stack
        working-directory: ./docker/
        run: docker compose -f docker-compose.dev-env.yml up db nginx reverie-web rest realtime auth mail -d --wait
      - name: Wait for migrations
        working-directory: ./docker/
        env:
            WAIT_TIMEOUT: 120
        run: |
          docker compose -f docker-compose.dev-env.yml up migrator -d
          timeout "${WAIT_TIMEOUT}" bash -c '
            docker compose -f docker-compose.dev-env.yml logs -f migrator |
            while IFS= read -r line; do
              echo "$line"
              [[ "$line" == *"All migrations applied"* ]] && exit 0
            done
          '

          # If we fall out of the timeout block, the migration didn’t finish in time
          echo "❌ Migration did not finish within ${WAIT_TIMEOUT}s"
          docker compose -f docker-compose.dev-env.yml logs migrator
          exit 1
      - name: Setup integration .env file
        working-directory: ./apps/web/
        run: |
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" > .env.it
          echo "VITE_SUPABASE_BASE_URL=http://localhost:8000" >> .env.it
      - name: Run Integration tests
        working-directory: ./apps/web/
        run: npm run test:integration
      - name: Shut down test stack
        working-directory: ./docker/
        if: always()
        run: docker compose -f docker-compose.dev-env.yml down
